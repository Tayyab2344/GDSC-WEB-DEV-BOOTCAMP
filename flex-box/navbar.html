<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      .navbar {
        display: flex;
        justify-content: space-around;
        align-items: center;
        background-color: black;
        color: white;

        padding: 15px 40px;
      }

      .logo {
        font-size: 20px;
        font-weight: bold;
      }

      .links {
        display: flex;
        justify-content: space-evenly;
        list-style: none;
        gap: 25px;
      }

      .links li {
        cursor: pointer;
      }

      .links li:hover {
        color: orange;
      }

      .btn {
        padding: 10px 20px;
        background-color: orange;
        color: white;
        border-radius: 20px;
      }
      .btn:hover {
        background-color: green;
        color: orange;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <p class="logo">logo</p>

      <ul class="links">
        <li>Home</li>
        <li>About us</li>
        <li>Contact</li>
      </ul>

      <button class="btn">Login</button>
    </nav>
  </body>
</html>
